#    model: gpt-4o-mini
#    max-tokens: 500

---
spring:
  config:
    activate:
      on-profile: docker
  ai:
    openai:
      api-key: ${APP_OPENAI_API_KEY}
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
    hikari:
      pool-name: HBMS-Docker-Pool
      maximum-pool-size: 10
      minimum-idle: 3
      connection-timeout: 30000
      connection-test-query: SELECT 1
  mail:
    host: ${SPRING_MAIL_HOST}
    port: ${SPRING_MAIL_PORT}
    username: ${SPRING_MAIL_USERNAME}
    password: ${SPRING_MAIL_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

app:
  jwt:
    secret: ${APP_JWT_SECRET}
    expiration: ${APP_JWT_EXPIRATION:900000}
    refresh-expiration: ${APP_JWT_REFRESH_EXPIRATION:604800000}
  cors:
    allowed-origins: "http://localhost:3000,http://localhost"
  payment:
    vnpay:
      tmn-code: ${APP_VNPAY_TMN_CODE}
      hash-secret: ${APP_VNPAY_HASH_SECRET}
      pay-url: https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
      return-url: http://localhost:3000/payment/?step=3
      timeout: 15
    momo:
      partner-code: ${APP_MOMO_PARTNER_CODE}
      access-key: ${APP_MOMO_ACCESS_KEY}
      secret-key: ${APP_MOMO_SECRET_KEY}
      endpoint-url: https://test-payment.momo.vn/v2/gateway/api/create
      return-url: http://localhost:3000/payment/?step=3
      request-type: captureWallet
      ipn-url: https://webhook.site/784642fe-feb2-4b1e-a31f-65e2e9349f6d
  openai:
    api-key: ${APP_OPENAI_API_KEY}
    model: gpt-4o-mini
    max-tokens: 500

logging:
  file:
    name: /app/logs/hbms.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 7