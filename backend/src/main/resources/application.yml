spring:
  application:
    name: hotel
  profiles:
    active: local
  ai:
    openai:
      api-key: "sk-placeholder"
      chat:
        options:
          model: gpt-4o-mini
          max-tokens: 500
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect
        format_sql: false
        globally_quoted_identifiers: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
    open-in-view: false
  mail:
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

server:
  port: 8080
  servlet:
    context-path: /api/v1

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: WARN
    com.hotel: INFO
    org.springframework.security: WARN
  pattern:
    console: "%d{HH:mm:ss} [%level] %logger{36} - %msg%n"

---
spring:
  config:
    activate:
      on-profile: local
  flyway:
    enabled: false
  ai:
    openai:
      api-key: "sk-xxxx-key-thật"
  datasource:
    url: jdbc:sqlserver://localhost:1433;databaseName=HotelBookingDB;encrypt=false;trustServerCertificate=true
    username: sa
    password: 123456
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
    hikari:
      pool-name: HBMS-Local-Pool
      maximum-pool-size: 5
  jpa:
    show-sql: true
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}

app:
  jwt:
    secret: hbms-hotel-booking-secret-key-2026-btl-java
    expiration: 900000
    refresh-expiration: 604800000
  cors:
    allowed-origins: "http://localhost:3000"
  payment:
    vnpay:
      tmn-code: ${VNPAY_TMN_CODE}
      hash-secret: ${VNPAY_HASH_SECRET}
      pay-url:  https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
      return-url: http://localhost:3000/payment/?step=3
      timeout: 15
    momo:
      partner-code: ${MOMO_PARTNER_CODE}
      access-key: ${MOMO_ACCESS_KEY}
      secret-key: ${MOMO_SECRET_KEY}
      endpoint-url: https://test-payment.momo.vn/v2/gateway/api/create
      return-url: http://localhost:3000/payment/?step=3
      request-type: captureWallet
      ipn-url: https://webhook.site/784642fe-feb2-4b1e-a31f-65e2e9349f6d

