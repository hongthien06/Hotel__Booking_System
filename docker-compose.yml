name: hbms

networks:
  hbms-network:
    driver: bridge

volumes:
  sqlserver-data-final:
  backend-logs:

services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: hbms-sqlserver
    hostname: sqlserver
    networks:
      - hbms-network
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SQL_SA_PASSWORD}"
      MSSQL_PID: "Developer"
      MSSQL_COLLATION: "Vietnamese_CI_AS"
    volumes:
      - sqlserver-data-final:/var/opt/mssql
    restart: unless-stopped

  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: hbms-db-init
    user: "0"
    networks:
      - hbms-network
    volumes:
      - ./database/HotelBookingDB.sql:/tmp/HotelBookingDB.sql
    env_file:
      - .env
    entrypoint:
      - /bin/bash
      - -c
      - |
        set -e
        echo 'Đợi SQL Server...'
        READY=0
        for i in $(seq 1 60); do
          if /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P "$$SQL_SA_PASSWORD" -Q 'SELECT 1' -C -N -l 5 > /dev/null 2>&1; then
            READY=1
            break
          fi
          echo "Thử lại sau 2s... ($$i/60)"
          sleep 2
        done
        if [ "$$READY" -ne 1 ]; then
          echo 'SQL Server không sẵn sàng sau 120s. Thoát!'
          exit 1
        fi

        echo 'Kiểm tra trạng thái database...'
        DB_EXISTS=$$(/opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P "$$SQL_SA_PASSWORD" -Q "SET NOCOUNT ON; SELECT count(*) FROM master.sys.databases WHERE name = 'HotelBookingDB'" -h -1 -C -N | tr -d '[:space:]')

        INIT_NEEDED=1
        if [ "$$DB_EXISTS" = "1" ]; then
          TABLE_EXISTS=$$(/opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P "$$SQL_SA_PASSWORD" -d HotelBookingDB -Q "SET NOCOUNT ON; SELECT count(*) FROM sys.tables WHERE name = 'Users'" -h -1 -C -N | tr -d '[:space:]')
          if [ "$$TABLE_EXISTS" = "1" ]; then
            INIT_NEEDED=0
          fi
        fi

        if [ "$$INIT_NEEDED" -eq 1 ]; then
          echo 'Đang nạp SQL khởi tạo...'
          /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P "$$SQL_SA_PASSWORD" -C -N < /tmp/HotelBookingDB.sql
          echo 'Khởi tạo database xong!'
        else
          echo 'Dữ liệu đã tồn tại, bỏ qua bước khởi tạo.'
        fi
    depends_on:
      - sqlserver

  backend:
    image: ${DOCKERHUB_USERNAME}/booking-backend:latest
    container_name: hbms-backend
    hostname: backend
    env_file:
      - .env
    networks:
      - hbms-network
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: "jdbc:sqlserver://sqlserver:1433;databaseName=HotelBookingDB;encrypt=false;trustServerCertificate=true"
      SPRING_DATASOURCE_USERNAME: "sa"
      SPRING_DATASOURCE_PASSWORD: "${SQL_SA_PASSWORD}"
      SPRING_JPA_HIBERNATE_DDL_AUTO: "none"
      SPRING_JPA_SHOW_SQL: "false"
      APP_JWT_SECRET: "${JWT_SECRET_KEY}"
      APP_JWT_EXPIRATION: "900000"
      APP_JWT_REFRESH_EXPIRATION: "604800000"
      SPRING_MAIL_HOST: "${MAIL_HOST}"
      SPRING_MAIL_PORT: "${MAIL_PORT}"
      SPRING_MAIL_USERNAME: "${MAIL_USERNAME}"
      SPRING_MAIL_PASSWORD: "${MAIL_PASSWORD}"
      APP_VNPAY_TMN_CODE: "${VNPAY_TMN_CODE}"
      APP_VNPAY_HASH_SECRET: "${VNPAY_HASH_SECRET}"
      APP_MOMO_PARTNER_CODE: "${MOMO_PARTNER_CODE}"
      APP_MOMO_ACCESS_KEY: "${MOMO_ACCESS_KEY}"
      APP_MOMO_SECRET_KEY: "${MOMO_SECRET_KEY}"
      GEMINI_API_KEY: "${GEMINI_API_KEY}"
      CLOUDINARY_CLOUD_NAME: "${CLOUDINARY_CLOUD_NAME}"
      CLOUDINARY_API_KEY: "${CLOUDINARY_API_KEY}"
      CLOUDINARY_API_SECRET: "${CLOUDINARY_API_SECRET}"
      SPRING_PROFILES_ACTIVE: "docker"
      JAVA_OPTS: "-Xms256m -Xmx512m -XX:+UseContainerSupport"
    volumes:
      - backend-logs:/app/logs
    depends_on:
      db-init:
        condition: service_completed_successfully
    restart: unless-stopped

  frontend:
    image: ${DOCKERHUB_USERNAME}/booking-frontend:latest
    container_name: hbms-frontend
    hostname: frontend
    networks:
      - hbms-network
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
