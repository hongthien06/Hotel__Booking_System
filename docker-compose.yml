name: hbms

networks:
  hbms-network:
    driver: bridge

volumes:
  sqlserver-data-final:
  backend-logs:

services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: hbms-sqlserver
    hostname: sqlserver
    networks:
      - hbms-network
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SQL_SA_PASSWORD}"
      MSSQL_PID: "Developer"
      MSSQL_COLLATION: "Vietnamese_CI_AS"
    volumes:
      - sqlserver-data-final:/var/opt/mssql
    restart: unless-stopped

  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: hbms-db-init
    networks:
      - hbms-network
    volumes:
      - ./database/HotelBookingDB.sql:/HotelBookingDB.sql:ro
    env_file:
      - .env
    entrypoint: /bin/bash -c "
      echo 'Đợi SQL Server...';
      for i in {1..60}; do
        /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P \"$SQL_SA_PASSWORD\" -Q 'SELECT 1' -No -C && break;
        echo 'Thử lại sau 2s...';
        sleep 2;
      done;
      echo 'Đang nạp SQL...';
      /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P \"$SQL_SA_PASSWORD\" -i /HotelBookingDB.sql -No -C;
      echo 'Xong!';"
    depends_on:
      - sqlserver

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hbms-backend
    hostname: backend
    env_file:
      - .env
    networks:
      - hbms-network
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: "jdbc:sqlserver://sqlserver:1433;databaseName=HotelBookingDB;encrypt=false;trustServerCertificate=true"
      SPRING_DATASOURCE_USERNAME: "sa"
      SPRING_DATASOURCE_PASSWORD: "${SQL_SA_PASSWORD}"
      SPRING_JPA_HIBERNATE_DDL_AUTO: "none"
      SPRING_JPA_SHOW_SQL: "false"
      APP_JWT_SECRET: "${JWT_SECRET_KEY}"
      APP_JWT_EXPIRATION: "900000"
      APP_JWT_REFRESH_EXPIRATION: "604800000"
      SPRING_MAIL_HOST: "${MAIL_HOST}"
      SPRING_MAIL_PORT: "${MAIL_PORT}"
      SPRING_MAIL_USERNAME: "${MAIL_USERNAME}"
      SPRING_MAIL_PASSWORD: "${MAIL_PASSWORD}"
      APP_VNPAY_TMN_CODE: "${VNPAY_TMN_CODE}"
      APP_VNPAY_HASH_SECRET: "${VNPAY_HASH_SECRET}"
      APP_MOMO_PARTNER_CODE: "${MOMO_PARTNER_CODE}"
      APP_MOMO_ACCESS_KEY: "${MOMO_ACCESS_KEY}"
      APP_MOMO_SECRET_KEY: "${MOMO_SECRET_KEY}"
      GEMINI_API_KEY: "${GEMINI_API_KEY}"
      SPRING_PROFILES_ACTIVE: "docker"
      JAVA_OPTS: "-Xms256m -Xmx512m -XX:+UseContainerSupport"
    volumes:
      - backend-logs:/app/logs
    depends_on:
      db-init:
        condition: service_completed_successfully
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "http://localhost:8080/api/v1"
    container_name: hbms-frontend
    hostname: frontend
    networks:
      - hbms-network
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
