name: hbms

networks:
  hbms-network:
    driver: bridge

volumes:
  sqlserver-data:
  backend-logs:


services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: hbms-sqlserver
    hostname: sqlserver
    networks:
      - hbms-network
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SQL_SA_PASSWORD}"
      MSSQL_PID: "Developer"
      MSSQL_COLLATION: "Vietnamese_CI_AS"
    volumes:
      - sqlserver-data:/var/opt/mssql
      - ./database/HotelBookingDB.sql:/docker-entrypoint-initdb.d/HotelBookingDB.sql:ro
      - ./database/init-db.sh:/usr/local/bin/init-db.sh:ro
    entrypoint: /bin/bash -c "/usr/local/bin/init-db.sh & /opt/mssql/bin/sqlservr"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hbms-backend
    hostname: backend
    env_file:
      - .env
    networks:
      - hbms-network
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: "jdbc:sqlserver://sqlserver:1433;databaseName=HotelBookingDB;encrypt=false;trustServerCertificate=true"
      SPRING_DATASOURCE_USERNAME: "sa"
      SPRING_DATASOURCE_PASSWORD: "${SQL_SA_PASSWORD}"
      SPRING_JPA_HIBERNATE_DDL_AUTO: "update"
      SPRING_JPA_SHOW_SQL: "false"
      APP_JWT_SECRET: "${JWT_SECRET_KEY}"
      APP_JWT_EXPIRATION: "900000"
      APP_JWT_REFRESH_EXPIRATION: "604800000"
      SPRING_MAIL_HOST: "${MAIL_HOST}"
      SPRING_MAIL_PORT: "${MAIL_PORT}"
      SPRING_MAIL_USERNAME: "${MAIL_USERNAME}"
      SPRING_MAIL_PASSWORD: "${MAIL_PASSWORD}"
      APP_VNPAY_TMN_CODE: "${VNPAY_TMN_CODE}"
      APP_VNPAY_HASH_SECRET: "${VNPAY_HASH_SECRET}"
      APP_MOMO_PARTNER_CODE: "${MOMO_PARTNER_CODE}"
      APP_MOMO_ACCESS_KEY: "${MOMO_ACCESS_KEY}"
      APP_MOMO_SECRET_KEY: "${MOMO_SECRET_KEY}"
      APP_OPENAI_API_KEY: "${OPENAI_API_KEY}"
      SPRING_PROFILES_ACTIVE: "docker"
      JAVA_OPTS: "-Xms256m -Xmx512m -XX:+UseContainerSupport"
    volumes:
      - backend-logs:/app/logs
    depends_on:
      - sqlserver
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "http://localhost:8080/api/v1"
    container_name: hbms-frontend
    hostname: frontend
    networks:
      - hbms-network
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
