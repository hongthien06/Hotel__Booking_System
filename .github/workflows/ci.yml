name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Backend: Build + Test
  backend:
    name: Backend (Java 21 / Maven)
    runs-on: ubuntu-latest

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          SA_PASSWORD: ${{ secrets.MSSQL_SA_PASSWORD }}
          ACCEPT_EULA: "Y"
          MSSQL_PID: Developer
          MSSQL_MEMORY_LIMIT_MB: 2048
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P $SA_PASSWORD -Q 'SELECT 1' -C -No"
          --health-interval 10s
          --health-timeout 8s
          --health-retries 20
          --health-start-period 60s

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Init database schema
        run: |
          for i in {1..20}; do
            /opt/mssql-tools18/bin/sqlcmd \
              -S localhost,1433 -U sa -P "${{ secrets.MSSQL_SA_PASSWORD }}" \
              -Q "IF DB_ID('HotelBookingDB') IS NULL CREATE DATABASE HotelBookingDB;" \
              -C -N && break
            echo "Waiting for SQL Server... ($i)"
            sleep 5
          done
          /opt/mssql-tools18/bin/sqlcmd \
            -S localhost,1433 -U sa -P "${{ secrets.MSSQL_SA_PASSWORD }}" \
            -d HotelBookingDB \
            -i database/HotelBookingDB.sql \
            -C -N || true

      - name: Build
        working-directory: backend
        run: mvn -B clean package -DskipTests

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-surefire-report
          path: backend/target/surefire-reports/
          retention-days: 7

      - name: Upload JAR
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar-${{ github.sha }}
          path: backend/target/*.jar
          retention-days: 3

  # Frontend: Build
  frontend:
    name: Frontend (Node 20 / Vite)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          VITE_API_BASE_URL: /api/v1
        run: npm run build

      - name: Upload dist
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ github.sha }}
          path: frontend/dist/
          retention-days: 3

  # Docker: Build images
  docker:
    name: Docker Images Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      # login docker hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            nguyennan12/booking-backend:latest
            nguyennan12/booking-backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            nguyennan12/booking-frontend:latest
            nguyennan12/booking-frontend:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max
